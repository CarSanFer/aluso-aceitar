<script>
const PROPS = D.props;
const TABS = [["resumo","RESUMO"],["TP","TRAB. PREPARATÓRIOS"],["ARQ","ARQUITETURA"],["ESP","ESPECIALIDADES"],["AVAC","AVAC"],["flags","SINALIZAÇÕES"]];
let curTab="resumo", curCh={TP:"1",ARQ:"3",ESP:"17",AVAC:"23"};

const NBSP="\u202F";
function fmt(n,dec=0){
  if(n===null||n===undefined) return "—";
  const neg=n<0; n=Math.abs(n);
  let s=n.toFixed(dec);
  let [i,f]=s.split(".");
  i=i.replace(/\B(?=(\d{3})+(?!\d))/g,NBSP);
  return (neg?"−":"")+i+(f?","+f:"")+NBSP+"€";
}
function pct(n){ return (n>=0?"+":"−")+Math.abs(n).toFixed(1).replace(".",",")+NBSP+"%"; }
function median(a){const s=[...a].sort((x,y)=>x-y);const m=Math.floor(s.length/2);return s.length%2?s[m]:(s[m-1]+s[m])/2;}

const AVAC_PRICED = PROPS.filter(p=>D.hasAVAC[p]);
const AVAC_MED = median(AVAC_PRICED.map(p=>D.totals[p].avac));

function priced(vals,p){ return vals[p]>0.005; }

function chapterTable(c){
  const ch=D.chapters[c];
  const vs=PROPS.filter(p=>priced(ch.vals,p)).map(p=>ch.vals[p]);
  const mn=Math.min(...vs), mx=Math.max(...vs), md=median(vs);
  let h=`<div class="kpis">
   <div class="kpi"><div class="l">Mínimo</div><div class="v" style="color:var(--min)">${fmt(mn)}</div><div class="s">${PROPS.find(p=>ch.vals[p]===mn)}</div></div>
   <div class="kpi"><div class="l">Máximo</div><div class="v" style="color:var(--max)">${fmt(mx)}</div><div class="s">${PROPS.find(p=>ch.vals[p]===mx)}</div></div>
   <div class="kpi"><div class="l">Mediana</div><div class="v">${fmt(md)}</div><div class="s">${vs.length} propostas com preço</div></div>
   <div class="kpi"><div class="l">Amplitude máx−mín</div><div class="v" style="color:var(--gold-l)">${fmt(mx-mn)}</div><div class="s">${pct((mx-mn)/mn*100)} sobre o mínimo</div></div>
  </div>`;
  h+=`<div class="card"><h2>Capítulo ${c} · ${ch.name}<small>total por proposta</small></h2><div class="scroll"><table><tr><th style="text-align:left">Proposta</th><th>Total</th><th>Δ vs mediana</th><th style="min-width:220px">Proporção</th></tr>`;
  const ord=[...PROPS].sort((a,b)=> (priced(ch.vals,b)?ch.vals[b]:1e15) - (priced(ch.vals,a)?ch.vals[a]:1e15)).reverse();
  for(const p of ord){
    const v=ch.vals[p];
    if(!priced(ch.vals,p)){ h+=`<tr><td class="lft"><b>${p}</b></td><td class="na">não cotado</td><td class="na">—</td><td></td></tr>`; continue; }
    const cls=v===mn?"min":(v===mx?"max":"");
    const d=(v-md)/md*100;
    h+=`<tr><td class="lft"><b>${p}</b></td><td class="${cls}">${fmt(v)}</td><td style="color:${d<=0?'var(--min)':'var(--max)'}">${pct(d)}</td><td class="lft"><div class="bar" style="width:${(v/mx*100).toFixed(1)}%"></div></td></tr>`;
  }
  h+=`</table></div></div>`;
  // subcapítulos
  if(ch.subs.length){
    h+=`<div class="card"><h2>Análise por subcapítulo<small>mínimo a verde · máximo a vermelho</small></h2><div class="scroll"><table><tr><th style="text-align:left;min-width:260px">Subcapítulo</th>${PROPS.map(p=>`<th>${p}</th>`).join("")}</tr>`;
    for(const s of ch.subs){
      const sv=PROPS.filter(p=>s.vals[p]>0.005).map(p=>s.vals[p]);
      const smn=sv.length?Math.min(...sv):null, smx=sv.length?Math.max(...sv):null;
      h+=`<tr><td class="lft">${s.label}</td>`;
      for(const p of PROPS){
        const v=s.vals[p];
        if(v>0.005){
          const cls=(v===smn&&sv.length>1)?"min":((v===smx&&sv.length>1)?"max":"");
          h+=`<td class="${cls}">${fmt(v)}</td>`;
        } else h+=`<td class="na">—</td>`;
      }
      h+=`</tr>`;
    }
    h+=`<tr class="tot"><td class="lft">Total do capítulo</td>${PROPS.map(p=>priced(ch.vals,p)?`<td>${fmt(ch.vals[p])}</td>`:`<td class="na">—</td>`).join("")}</tr>`;
    h+=`</table></div></div>`;
  }
  // sinalizações do capítulo
  const fl=D.flags[c];
  const any=PROPS.some(p=>fl[p].length);
  if(any){
    h+=`<div class="card"><h2>Sinalizações neste capítulo<small>itens incluídos, excluídos, repetidos ou sem preço</small></h2>`;
    for(const p of PROPS){
      if(!fl[p].length) continue;
      h+=`<div style="margin:10px 0 6px;font-weight:bold">${p}<span class="badge b-flag">${fl[p].length}</span></div>`;
      for(const f of fl[p]){
        const k=f.flag.substring(0,3).replace("Ã","A");
        h+=`<div class="fl"><span class="fid">${f.id||""}</span><span class="ftype ${k}">${f.flag}</span><span>${f.desc}</span></div>`;
      }
    }
    h+=`</div>`;
  }
  return h;
}

function groupView(g){
  const chs=D.groups[g];
  let h="";
  if(chs.length>1){
    h+=`<div class="chips">`+chs.map(c=>`<button class="${curCh[g]===c?'on':''}" onclick="curCh['${g}']='${c}';render()">${c} · ${D.chNames[c]}</button>`).join("")+`</div>`;
  } else { curCh[g]=chs[0]; }
  h+=chapterTable(curCh[g]);
  return h;
}

function resumo(){
  const rows=PROPS.map(p=>{
    const t=D.totals[p];
    const adj = t.semAvac + (t.avac>0 ? t.avac : AVAC_MED);
    return {p, ...t, adj, est: !(t.avac>0)};
  }).sort((a,b)=>a.adj-b.adj);
  const minAdj=rows[0].adj;
  const sa=rows.map(r=>r.semAvac);
  let h=`<div class="kpis">
   <div class="kpi"><div class="l">Propostas analisadas</div><div class="v">6</div><div class="s">MQT comum · 23 capítulos</div></div>
   <div class="kpi"><div class="l">Proposta mais baixa · comparável</div><div class="v" style="color:var(--min)">${rows[0].p}</div><div class="s">${fmt(minAdj)} com AVAC</div></div>
   <div class="kpi"><div class="l">Amplitude · base 1–22</div><div class="v" style="color:var(--gold-l)">${fmt(Math.max(...sa)-Math.min(...sa))}</div><div class="s">${pct((Math.max(...sa)-Math.min(...sa))/Math.min(...sa)*100)} sobre o mínimo</div></div>
   <div class="kpi"><div class="l">AVAC cotado</div><div class="v">3 de 6</div><div class="s">Cari · Invénio · Secular</div></div>
  </div>`;
  // ranking
  h+=`<div class="card"><h2>Ranking · total comparável com AVAC<small>propostas sem AVAC ajustadas pela mediana AVAC (${fmt(AVAC_MED)})</small></h2><div class="rank">`;
  rows.forEach((r,i)=>{
    h+=`<div class="rrow"><div class="pos">${i+1}º</div><div class="nm">${r.p}${r.est?'<span class="badge b-warn">AVAC estim.</span>':''}${i===0?'<span class="badge b-min">MAIS BAIXA</span>':''}${i===rows.length-1?'<span class="badge b-max">MAIS ALTA</span>':''}</div>
      <div><div class="bar" style="width:${(r.adj/rows[rows.length-1].adj*100).toFixed(1)}%"></div></div>
      <div class="val">${fmt(r.adj)}</div></div>`;
  });
  h+=`</div></div>`;
  // tabela totais
  h+=`<div class="card"><h2>Totais por proposta</h2><div class="scroll"><table>
   <tr><th style="text-align:left">Proposta</th><th>Base · Cap. 1–22</th><th>AVAC · Cap. 23</th><th>Total apresentado</th><th>Total comparável</th><th>Δ vs mais baixa</th><th>Sinalizações</th></tr>`;
  for(const r of rows){
    h+=`<tr><td class="lft"><b>${r.p}</b></td><td>${fmt(r.semAvac)}</td><td>${r.avac>0?fmt(r.avac):'<span class="na">não cotado</span>'}</td><td>${fmt(r.total)}</td><td><b>${fmt(r.adj)}</b>${r.est?'<span class="badge b-warn">est.</span>':''}</td><td style="color:${r.adj===minAdj?'var(--min)':'var(--max)'}">${r.adj===minAdj?'—':pct((r.adj-minAdj)/minAdj*100)}</td><td>${r.nFlags}</td></tr>`;
  }
  h+=`</table></div></div>`;
  // heatmap capítulos
  h+=`<div class="card"><h2>Matriz capítulo × proposta<small>mínimo a verde · máximo a vermelho · base capítulos 1–22 + AVAC</small></h2><div class="scroll"><table>
   <tr><th style="text-align:left;min-width:230px">Capítulo</th>${PROPS.map(p=>`<th>${p}</th>`).join("")}</tr>`;
  for(let i=1;i<=23;i++){
    const c=String(i), ch=D.chapters[c];
    const vs=PROPS.filter(p=>priced(ch.vals,p)).map(p=>ch.vals[p]);
    const mn=Math.min(...vs), mx=Math.max(...vs);
    h+=`<tr><td class="lft">${c} · ${ch.name}</td>`;
    for(const p of PROPS){
      const v=ch.vals[p];
      if(priced(ch.vals,p)){
        const cls=v===mn?"min":(v===mx?"max":"");
        h+=`<td class="${cls}">${fmt(v)}</td>`;
      } else h+=`<td class="na">—</td>`;
    }
    h+=`</tr>`;
  }
  h+=`<tr class="tot"><td class="lft">Total com AVAC (real ou estimado)</td>${rows.slice().sort((a,b)=>PROPS.indexOf(a.p)-PROPS.indexOf(b.p)).map(r=>`<td>${fmt(r.adj)}</td>`).join("")}</tr>`;
  h+=`</table></div></div>`;
  // maiores desvios
  const dev=[];
  for(let i=1;i<=23;i++){
    const c=String(i), ch=D.chapters[c];
    const vs=PROPS.filter(p=>priced(ch.vals,p)).map(p=>ch.vals[p]);
    if(vs.length<2) continue;
    const mn=Math.min(...vs), mx=Math.max(...vs);
    dev.push({c, name:ch.name, amp:mx-mn, rel:(mx-mn)/mn*100, mn, mx});
  }
  dev.sort((a,b)=>b.amp-a.amp);
  h+=`<div class="grid2"><div class="card"><h2>Maiores amplitudes absolutas</h2><table><tr><th style="text-align:left">Capítulo</th><th>Mín</th><th>Máx</th><th>Amplitude</th></tr>`;
  for(const d of dev.slice(0,6)) h+=`<tr><td class="lft">${d.c} · ${d.name}</td><td class="min">${fmt(d.mn)}</td><td class="max">${fmt(d.mx)}</td><td><b>${fmt(d.amp)}</b></td></tr>`;
  h+=`</table></div>`;
  h+=`<div class="card"><h2>Riscos de comparabilidade</h2>
   <div class="fl"><span class="ftype NAO">AVAC</span><span>Acapolis, Engivallis e DG não cotam o capítulo 23 — total comparável calculado com a mediana AVAC (${fmt(AVAC_MED)}).</span></div>
   <div class="fl"><span class="ftype EXC">EXCLUÍDO</span><span>Acapolis exclui pedra natural em cozinhas e vãos (cap. 10), base de duche (cap. 13) e portas corta-fogo (cap. 22) — 33 sinalizações, o valor real será superior.</span></div>
   <div class="fl"><span class="ftype SEM">SEM PREÇO</span><span>Secular apresenta 44 itens sem preço (vãos interiores, fotovoltaico, serralharias) — proposta mais baixa mas com maior incompletude.</span></div>
   <div class="fl"><span class="ftype SEM">SEM PREÇO</span><span>Engivallis não cota o apoio de construção civil às artes (item 1.4) nem desmontes do cap. 2 — impacto direto em obra.</span></div>
   <div class="fl"><span class="ftype INC">INCLUÍDO</span><span>Cari dilui PSS, PPGRCD e telas finais no estaleiro (cap. 1 mais alto: ${fmt(D.chapters['1'].vals['Cari'])}) — comparar cap. 1+2 em conjunto.</span></div>
  </div></div>`;
  return h;
}

function flagsView(){
  let h=`<div class="kpis">`;
  for(const p of PROPS){ h+=`<div class="kpi"><div class="l">${p}</div><div class="v">${D.totals[p].nFlags}</div><div class="s">sinalizações</div></div>`; }
  h+=`</div>`;
  for(const p of PROPS){
    const all=[];
    for(let i=1;i<=23;i++){ for(const f of D.flags[String(i)][p]) all.push({...f,ch:String(i)}); }
    if(!all.length) continue;
    h+=`<div class="card"><h2>${p}<small>${all.length} itens sinalizados</small></h2>`;
    for(const f of all){
      const k=f.flag.substring(0,3).replace("Ã","A");
      h+=`<div class="fl"><span class="fid">Cap. ${f.ch} · ${f.id||""}</span><span class="ftype ${k}">${f.flag}</span><span>${f.desc}</span></div>`;
    }
    h+=`</div>`;
  }
  return h;
}

function render(){
  document.getElementById("tabs").innerHTML = TABS.map(([k,l])=>`<button class="${curTab===k?'on':''}" onclick="curTab='${k}';render()">${l}</button>`).join("");
  const v=document.getElementById("view");
  if(curTab==="resumo") v.innerHTML=resumo();
  else if(curTab==="flags") v.innerHTML=flagsView();
  else v.innerHTML=groupView(curTab);
  window.scrollTo(0,0);
}
render();
</script>
</body>
</html>
